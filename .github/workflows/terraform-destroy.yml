name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm you really want to delete all resources'
        required: true
        type: string

permissions:
  contents: read

jobs:
  guard:
    name: Confirm input
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation string
        run: |
          if [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' (lowercase) in the confirm input."
            exit 1
          fi

  terraform:
    name: Terraform Destroy
    needs: guard
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ./environments/default

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
      TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
      TF_VAR_cvm_password: ${{ secrets.CVM_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (destroy)
        run: terraform plan -destroy -out=tfplan -input=false

      - name: Terraform Destroy
        run: terraform apply -auto-approve -input=false tfplan
